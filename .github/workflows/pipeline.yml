name: Docker CI/CD Pipeline
# Xác định sự kiện trigger cho pipeline, push lên nhánh develop
on: 
    push:
        branches: 
            - develop
jobs:
    # Job 1: Build và test ứng dụng, sau đó đẩy image lên Docker Hub
    build_and_test:
        runs-on: ubuntu-latest

        steps: 
            - name: Checkout repository
            # Sử dụng action "checkout" để copy code từ repository vào máy ảo Ubuntu
              uses: actions/checkout@v4

            - name: Set up .NET
              uses: actions/setup-dotnet@v3
              with:
                dotnet-version: 8.0.x
            
            - name: Restore dependencies
              run: dotnet restore
            
            - name: Run tests
              run: dotnet test --no-build

            - name: Login dockerhub
            # Sử dụng action "docker/login-action" để đăng nhập vào Docker Hub
              uses: docker/login-action@v3
              with: 
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Set up docker buildx
              uses: docker/setup-buildx-action@v3
            
            - name: Build and push docker image
            # Sử dụng action "docker/build-push-action" để đẩy image lên Docker Hub
              uses: docker/build-push-action@v5
              with:
                context: .
                push: true
                tags: |
                    khanhpl/media-store:latest
                    khanhpl/media-store:${{ github.run_number }}
    # Job 2: Deploy ứng dụng lên Render sau khi build và test thành công
    deploy:
        needs: build_and_test
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to render
              run: curl -X POST ${{ secrets.RENDER_DEPLOY_WEBHOOK }}